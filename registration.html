<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Registration</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="card">

<h1>📝 Team Registration</h1>

<input type="text" id="team" placeholder="Team Name">

<input type="text" id="captain" placeholder="Captain Name">

<input type="text" id="bgmi" placeholder="BGMI UID">

<input type="tel" id="phone" placeholder="Phone Number">

<input type="number" id="entryFee" placeholder="Entry Fee">

<h3>💳 Scan QR & Pay</h3>

<img src="qr.png" alt="QR Code">

<input type="text" id="utr" placeholder="Enter UTR Number">

<button id="registerBtn">
Register Team
</button>

<br><br>

<a href="index.html" class="btn">
⬅ Back Home
</a>

</div>

</div>

<script type="module" src="registration.js"></script>

</body>
</html>
